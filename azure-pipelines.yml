trigger:
- main

pr:
- main

pool:
  vmImage: "ubuntu-latest"

variables:
  CI: "true"
  PLAYWRIGHT_JUNIT_OUTPUT_NAME: "junit.xml"

steps:
- checkout: self
  clean: true

- task: UseNode@1
  inputs:
    version: "20.x"
  displayName: "Use Node.js 20"

- script: npm ci
  displayName: "Install dependencies"

- script: npx playwright install --with-deps chromium
  displayName: "Install Playwright browser and dependencies"

- script: npm run test:e2e
  displayName: "Run Playwright end-to-end tests"

- script: node website_qa_runner.mjs "$(websiteUrl)"
  displayName: "Run AI-generated website automation"
  condition: and(succeeded(), ne(variables['websiteUrl'], ''))
  env:
    GEMINI_API_KEY: $(GEMINI_API_KEY)
    GEMINI_MODEL: $(GEMINI_MODEL)
    GEMINI_BASE_URL: $(GEMINI_BASE_URL)
    AI_PROVIDER: gemini

- task: PublishTestResults@2
  displayName: "Publish JUnit test results"
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: "JUnit"
    testResultsFiles: "test-results/junit.xml"
    failTaskOnFailedTests: true
    testRunTitle: "Trip Budget Planner E2E"

- task: PublishPipelineArtifact@1
  displayName: "Publish Playwright HTML report"
  condition: succeededOrFailed()
  inputs:
    targetPath: "playwright-report"
    artifact: "playwright-report"
    publishLocation: "pipeline"

- task: PublishPipelineArtifact@1
  displayName: "Publish raw test artifacts"
  condition: succeededOrFailed()
  inputs:
    targetPath: "test-results"
    artifact: "test-results"
    publishLocation: "pipeline"
