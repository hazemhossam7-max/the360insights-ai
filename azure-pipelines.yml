trigger:
- main

pr:
- main

parameters:
  - name: websiteUrl
    displayName: Website URL
    type: string
    default: ""

pool:
  vmImage: "ubuntu-latest"

variables:
  CI: "true"
  PLAYWRIGHT_JUNIT_OUTPUT_NAME: "junit.xml"

steps:
- checkout: self
  clean: true

- task: UseNode@1
  inputs:
    version: "20.x"
  displayName: "Use Node.js 20"

- script: npm ci
  displayName: "Install dependencies"

- script: npx playwright install --with-deps chromium
  displayName: "Install Playwright browser and dependencies"

- ${{ if ne(parameters.websiteUrl, '') }}:
  - script: node website_qa_runner.mjs "${{ parameters.websiteUrl }}"
    displayName: "Run website generation and automation"
    env:
      AZDO_PROJECT_URL: $(AZDO_PROJECT_URL)
      OPENAI_API_KEY: $(OPENAI_API_KEY)
      OPENAI_MODEL: $(OPENAI_MODEL)
      OPENAI_BASE_URL: $(OPENAI_BASE_URL)
      AI_PROVIDER: openai
      AZDO_ORG_URL: $(AZDO_ORG_URL)
      SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)
      AZDO_PROJECT: $(AZDO_PROJECT)
      SYSTEM_TEAMPROJECT: $(System.TeamProject)
      AZDO_PAT: $(AZDO_PAT)
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      AZDO_TEST_PLAN_ID: $(AZDO_TEST_PLAN_ID)
      AZDO_TEST_SUITE_ID: $(AZDO_TEST_SUITE_ID)

- task: PublishTestResults@2
  displayName: "Publish JUnit test results"
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: "JUnit"
    testResultsFiles: "test-results/junit.xml"
    failTaskOnFailedTests: true
    testRunTitle: "Website Automation"

- task: PublishPipelineArtifact@1
  displayName: "Publish suite bug reports"
  condition: succeededOrFailed()
  inputs:
    targetPath: "bug_reports"
    artifact: "bug_reports"
    publishLocation: "pipeline"

- task: PublishPipelineArtifact@1
  displayName: "Publish raw test artifacts"
  condition: succeededOrFailed()
  inputs:
    targetPath: "test-results"
    artifact: "test-results"
    publishLocation: "pipeline"
